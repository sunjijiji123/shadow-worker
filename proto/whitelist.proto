syntax = "proto3";

package shadowworker;

// 白名单应用管理(卡片式 CRUD)
// Qt 客户端 → Go 服务

option go_package = "shadow-worker/backend/internal/grpcapi;grpcapi";

service WhitelistService {
  // 列出所有白名单应用
  rpc List(ListAppsRequest) returns (AppList);
  // 添加应用(Qt 选完窗口后调,传完整路径)
  rpc Add(AddAppRequest) returns (App);
  // 移除应用
  rpc Remove(RemoveAppRequest) returns (Result);
  // 改类别(点 chip 弹选项后调)
  rpc UpdateCategory(UpdateCategoryRequest) returns (App);
  // 列出当前所有可见顶层窗口(供客户端"添加采集应用"选择)
  rpc ListWindows(ListWindowsRequest) returns (WindowList);
  // 取指定窗口的缩略图截图(320×180 PNG)，供"添加采集应用"网格预览懒加载。
  // 失败(窗口已关/hwnd失效)返回空 png 字节，由前端降级为占位图。
  rpc GetWindowThumbnail(ThumbnailRequest) returns (ThumbnailData);
}

message ListAppsRequest {
  string date = 1;  // 可选:返回各应用该日 today_minutes
}

message AddAppRequest {
  string path = 1;       // 完整进程路径 C:\...\Cursor.exe
  string name = 2;       // 显示名 Cursor
  string category = 3;   // 默认 other,coding/office/browser/chat/other
}

message RemoveAppRequest {
  string path = 1;
}

message UpdateCategoryRequest {
  string path = 1;
  string category = 2;
}

// 白名单应用(对应 DB app_categories 表 + 聚合今日时长)
message App {
  string path = 1;
  string name = 2;
  string category = 3;
  string icon_path = 4;    // 图标缓存路径(可选)
  int32 today_minutes = 5; // 今日时长(聚合 activity_segments)
  int64 added_at = 6;      // unix 秒
}

message AppList {
  repeated App apps = 1;
}

message Result {
  bool ok = 1;
  string error = 2;
}

message ListWindowsRequest {}

// WindowInfo 描述一个当前可见的顶层窗口(供客户端选择)。
message WindowInfo {
  int64 hwnd = 1;       // 窗口句柄(仅本次枚举有效,客户端不持久化)
  string path = 2;      // 进程完整路径(与 App.path 同义,选完可直接喂给 Add)
  string name = 3;      // 进程名(filepath.Base,如 Cursor.exe)
  string title = 4;     // 窗口标题(GetWindowTextW)
}

message WindowList {
  repeated WindowInfo windows = 1;
}

// 缩略图请求：按 hwnd(来自 ListWindows) 取该窗口当前截图。
message ThumbnailRequest {
  int64 hwnd = 1;   // 窗口句柄(仅本次会话有效，来自 ListWindows 返回值)
}

// 缩略图响应：320×180 PNG。png 为空表示截图失败(窗口已关/hwnd失效)，
// 客户端应降级为占位图，不视为错误。
message ThumbnailData {
  bytes png = 1;
}
